<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 140" font-family="'Latin Modern Math', 'STIX Two Math', 'Cambria Math', Georgia, serif">

  <!-- Wedge product equation -->
  <g transform="translate(350, 35)">
    <text x="-230" y="0" text-anchor="middle" font-size="18" fill="#333" font-style="italic">ẽ₁ ∧ ẽ₂</text>
    <text x="-150" y="0" text-anchor="middle" font-size="22" fill="#333">=</text>
    <text x="-95" y="0" text-anchor="middle" font-size="19" fill="#c0392b" font-weight="bold">1</text>
    <text x="-78" y="0" text-anchor="middle" font-size="15" fill="#333">·</text>
    <text x="-55" y="0" text-anchor="middle" font-size="16" fill="#333" font-style="italic">e₁∧e₂</text>
    <text x="0" y="0" text-anchor="middle" font-size="19" fill="#333">+</text>
    <text x="45" y="0" text-anchor="middle" font-size="19" fill="#c0392b" font-weight="bold">1</text>
    <text x="62" y="0" text-anchor="middle" font-size="15" fill="#333">·</text>
    <text x="85" y="0" text-anchor="middle" font-size="16" fill="#333" font-style="italic">e₁∧e₃</text>
    <text x="140" y="0" text-anchor="middle" font-size="19" fill="#333">+</text>
    <text x="185" y="0" text-anchor="middle" font-size="19" fill="#c0392b" font-weight="bold">1</text>
    <text x="202" y="0" text-anchor="middle" font-size="15" fill="#333">·</text>
    <text x="225" y="0" text-anchor="middle" font-size="16" fill="#333" font-style="italic">e₂∧e₃</text>
  </g>

  <!-- Tree icons -->
  <g transform="translate(350, 90)">
    <!-- Tree {e1,e2} -->
    <g transform="translate(-120, 0) scale(0.35)">
      <line x1="-60" y1="-45" x2="60" y2="-45" stroke="#c0392b" stroke-width="4"/>
      <line x1="-60" y1="-45" x2="0" y2="45" stroke="#c0392b" stroke-width="4"/>
      <line x1="60" y1="-45" x2="0" y2="45" stroke="#ddd" stroke-width="2" stroke-dasharray="4,3"/>
      <circle cx="-60" cy="-45" r="7" fill="#4a90d9"/>
      <circle cx="60" cy="-45" r="7" fill="#4a90d9"/>
      <circle cx="0" cy="45" r="7" fill="#4a90d9"/>
    </g>
    <!-- Tree {e1,e3} -->
    <g transform="translate(0, 0) scale(0.35)">
      <line x1="-60" y1="-45" x2="60" y2="-45" stroke="#c0392b" stroke-width="4"/>
      <line x1="-60" y1="-45" x2="0" y2="45" stroke="#ddd" stroke-width="2" stroke-dasharray="4,3"/>
      <line x1="60" y1="-45" x2="0" y2="45" stroke="#c0392b" stroke-width="4"/>
      <circle cx="-60" cy="-45" r="7" fill="#4a90d9"/>
      <circle cx="60" cy="-45" r="7" fill="#4a90d9"/>
      <circle cx="0" cy="45" r="7" fill="#4a90d9"/>
    </g>
    <!-- Tree {e2,e3} -->
    <g transform="translate(120, 0) scale(0.35)">
      <line x1="-60" y1="-45" x2="60" y2="-45" stroke="#ddd" stroke-width="2" stroke-dasharray="4,3"/>
      <line x1="-60" y1="-45" x2="0" y2="45" stroke="#c0392b" stroke-width="4"/>
      <line x1="60" y1="-45" x2="0" y2="45" stroke="#c0392b" stroke-width="4"/>
      <circle cx="-60" cy="-45" r="7" fill="#4a90d9"/>
      <circle cx="60" cy="-45" r="7" fill="#4a90d9"/>
      <circle cx="0" cy="45" r="7" fill="#4a90d9"/>
    </g>
  </g>

  <text x="350" y="130" text-anchor="middle" font-size="13" fill="#888">Each coordinate = ±1 for spanning trees, 0 for edge sets with cycles</text>
</svg>